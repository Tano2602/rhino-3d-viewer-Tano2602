<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhino 3D Viewer - High Quality Rendering</title>
    <link rel="stylesheet" href="style.css">
    <!-- Babylon.js library для рендеринга 3D -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <!-- Babylon.js loaders для загрузки моделей -->
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
    <!-- Контейнер для 3D сцены -->
    <div id="renderCanvas"></div>
    
    <!-- Панель управления -->
    <div class="control-panel">
        <h1>Rhino 3D Viewer</h1>
        
        <!-- Загрузка файла -->
        <div class="control-group">
            <label for="fileInput">📁 Загрузить модель (glTF/GLB/OBJ/STL):</label>
            <input type="file" id="fileInput" accept=".gltf,.glb,.obj,.stl" />
            <div id="loadingStatus"></div>
        </div>
        
        <!-- Управление освещением -->
        <div class="control-group">
            <h3>💡 Освещение</h3>
            <label for="lightIntensity">Интенсивность света:</label>
            <input type="range" id="lightIntensity" min="0" max="2" step="0.1" value="1">
            <span id="lightValue">1.0</span>
        </div>
        
        <!-- Управление камерой -->
        <div class="control-group">
            <h3>🎥 Камера</h3>
            <button id="resetCamera">Сбросить позицию</button>
            <button id="autoRotate">🔄 Авто-вращение</button>
        </div>
        
        <!-- Информация о модели -->
        <div class="control-group">
            <h3>ℹ️ Информация</h3>
            <div id="modelInfo">Модель не загружена</div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
